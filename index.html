<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CashFlow • Finance Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <meta name="theme-color" content="#10b981">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <div class="app">
        <!-- Top Bar -->
        <header class="header">
            <h1>CashFlow</h1>
            <div class="balance">
                <span class="label">Available</span>
                <span id="total-balance" class="amount">$0.00</span>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="bottom-nav">
            <a href="#" data-page="dashboard" class="nav-item active">
                <span class="icon">📊</span>
                <span>Dashboard</span>
            </a>
            <a href="#" data-page="income" class="nav-item">
                <span class="icon">💰</span>
                <span>Income</span>
            </a>
            <a href="#" data-page="transactions" class="nav-item">
                <span class="icon">📋</span>
                <span>Transactions</span>
            </a>
            <a href="#" data-page="goals" class="nav-item">
                <span class="icon">🎯</span>
                <span>Goals</span>
            </a>
        </nav>

        <!-- Pages -->
        <main id="pages">
            <!-- Dashboard Page -->
            <div id="dashboard" class="page active">
                <div class="summary-cards">
                    <div class="card">
                        <div class="card-header">This Week</div>
                        <div id="week-balance" class="card-amount">$0</div>
                    </div>
                    <div class="card">
                        <div class="card-header">This Month</div>
                        <div id="month-balance" class="card-amount">$0</div>
                    </div>
                </div>
                
                <div class="section">
                    <h2>Upcoming Bills</h2>
                    <div id="upcoming-bills" class="list"></div>
                </div>
                
                <div class="section">
                    <h2>Recent Transactions</h2>
                    <div id="recent-transactions" class="list"></div>
                </div>
            </div>

            <!-- Income Page -->
            <div id="income" class="page">
                <h2>Add Income</h2>
                <form id="income-form">
                    <div class="input-group">
                        <label>Income Type</label>
                        <select id="income-type">
                            <option value="full-time">Full Time</option>
                            <option value="part-time">Part Time</option>
                            <option value="casual">Casual</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Amount</label>
                        <input type="number" id="income-amount" placeholder="0.00" step="0.01">
                    </div>
                    <div class="input-group">
                        <label>Pay Frequency</label>
                        <select id="pay-frequency">
                            <option value="weekly">Weekly</option>
                            <option value="fortnightly">Fortnightly</option>
                            <option value="monthly">Monthly</option>
                        </select>
                    </div>
                    <button type="submit">Add Income Source</button>
                </form>
                
                <div id="income-list" class="list"></div>
            </div>

            <!-- Transactions Page -->
            <div id="transactions" class="page">
                <h2>Add Transaction / Bill</h2>
                <form id="transaction-form">
                    <div class="input-group">
                        <label>Type</label>
                        <select id="trans-type">
                            <option value="expense">Expense</option>
                            <option value="bill">Bill</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Description</label>
                        <input type="text" id="trans-desc" placeholder="Groceries, Rent...">
                    </div>
                    <div class="input-group">
                        <label>Amount</label>
                        <input type="number" id="trans-amount" placeholder="0.00" step="0.01">
                    </div>
                    <div class="input-group">
                        <label>Date</label>
                        <input type="date" id="trans-date">
                    </div>
                    <button type="submit">Add</button>
                </form>
                
                <div id="transactions-list" class="list"></div>
            </div>

            <!-- Goals Page -->
            <div id="goals" class="page">
                <h2>Savings Goals</h2>
                <form id="goal-form">
                    <div class="input-group">
                        <label>Goal Name</label>
                        <input type="text" id="goal-name" placeholder="New Car">
                    </div>
                    <div class="input-group">
                        <label>Target Amount</label>
                        <input type="number" id="goal-target" placeholder="5000">
                    </div>
                    <button type="submit">Add Goal</button>
                </form>
                
                <div id="goals-list" class="list"></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
